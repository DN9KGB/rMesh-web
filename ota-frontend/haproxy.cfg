global
    log stdout format raw local0
    maxconn 2048

defaults
    log     global
    option  dontlognull
    timeout connect 5s
    timeout client  3m
    timeout server  3m

# --- Eingang auf 8082: TLS-Hello sniffen ---------------------------------
frontend ota_in
    bind *:8082
    mode tcp
    tcp-request inspect-delay 2s
    tcp-request content accept if { req.ssl_hello_type 1 }
    tcp-request content accept if !{ req.ssl_hello_type 1 }
    use_backend ota_tls if { req.ssl_hello_type 1 }
    default_backend ota_plain

# TLS-Verbindungen → loopback-Frontend, das TLS terminiert
backend ota_tls
    mode tcp
    server tls_term 127.0.0.1:8443

# Plain-HTTP direkt zum PHP-Container
backend ota_plain
    mode tcp
    server php php:80

# --- Loopback: TLS terminieren, dann als Plain-HTTP an php weiterreichen --
frontend ota_tls_term
    bind 127.0.0.1:8443 ssl crt /certs/ota.pem
    mode http
    option httplog
    default_backend ota_http

backend ota_http
    mode http
    server php php:80
